[project]
name = "evtol-vertiport-rl"
version = "0.0.1"
description = "eVTOL vertiport location-allocation via diffusion + RL (master's thesis)"
requires-python = ">=3.10"
dependencies = [
    "pandas>=2.0",
    "pyarrow>=14.0",
    "numpy>=1.24",
    "pyyaml>=6.0",
    # Stage-1 EDA report (task 8). matplotlib for hand-picked plots,
    # ydata-profiling for the auto-generated HTML summary.
    "matplotlib>=3.7",
    "ydata-profiling>=4.6",
    # Stage-2 spatial discretization. h3 pinned <4 so the v3 API names
    # used in the plan (geo_to_h3, h3_to_geo, h3_to_geo_boundary) stay
    # valid; osmnx for OSM POI pulls; geopandas/shapely for geometry;
    # folium/branca for the interactive maps (task 6).
    "h3>=3.7,<4",
    "osmnx>=2.0",
    "geopandas>=1.0",
    "shapely>=2.0",
    "folium>=0.15",
    "branca>=0.7",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "ruff>=0.1.0",
    "mypy>=1.0",
]

[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

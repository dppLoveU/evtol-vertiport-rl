# Stage-5 RL environment config (PR1 minimal VertiportEnv).
# Loaded by experiments/run_stage5_env_smoke.py and the Stage-6 PPO
# trainer (PyYAML; Hydra wiring is a future task -- see docs/decisions.md
# 2026-05-14). The keys here are the source of truth; code reads them and
# never hardcodes values.

seed: 42

# Frozen Stage-5 scenario source. od_samples_agg.npy is the bootstrap
# day-block sampler output, frozen by Stage 4B-5C PR5C-3B; see
# data/synthetic/od_samples_agg_source.txt. It is already aggregated over
# time -- shape [n_omega, n_zones, n_zones], int32, nonnegative. The
# diffusion raw/calibrated arrays are retained only as paper comparison
# rows and are NOT a Stage-5 input.
scenario_source: data/synthetic/od_samples_agg.npy
scenario_source_origin: bootstrap_day_block

# Stage-2 spatial artifacts.
zones_path: data/processed/zones.geojson
candidates_path: data/processed/candidates.geojson
cand_covers_zones_path: data/processed/cand_covers_zones.npy
dist_zone_cand_path: data/processed/dist_zone_cand.npy

# Dimensions (validated against the loaded arrays at env construction).
n_zones: 530
n_candidates: 813
n_omega: 64

# Number of vertiports placed per episode.
k_select: 10

reward:
  # incremental_bilateral_coverage: per step, reward = newly covered
  # bilateral OD demand / total OD demand of the episode's scenario.
  type: incremental_bilateral_coverage
  normalize: true

env:
  # invalid_action: "mask" -- already-selected candidates are excluded by
  # action_masks(); stepping a masked action raises ValueError.
  invalid_action: mask
  seed: 42

# Observation features (Stage-6 PR2). When include_demand_features is
# true the observation gains a per-zone demand summary derived from the
# episode's sampled scenario, so the policy is no longer scenario-blind.
# demand_features is a [n_zones, 4] float32 array; the four columns are,
# in order:
#   origin_outflow[z]          = scenario OD[z, :].sum()
#   destination_inflow[z]      = scenario OD[:, z].sum()
#   total_zone_flow[z]         = origin_outflow[z] + destination_inflow[z]
#   covered_zone_indicator[z]  = 1.0 if zone z is currently covered
# The full [Z, Z] OD matrix is deliberately NOT exposed (too large).
# normalize_demand_features divides the first three columns by
# max(total_zone_flow) + eps within the scenario so they live in [0, 1];
# covered_zone_indicator is always 0/1.
observation:
  include_demand_features: true
  demand_features:
    - origin_outflow
    - destination_inflow
    - total_zone_flow
    - covered_zone_indicator
  normalize_demand_features: true

# Stage-4 diffusion model config -- 12 km eVTOL + zero-pinned norm
# + weighted-loss plumbing (Stage 4B-5B).
#
# Sibling of configs/diffusion_12km.yaml. Differs only in:
#   * data.scheme: zero_pinned_nonzero        (was global_clip implicit)
#   * data.clip_val: 20.0                     (was 100.0)
#   * data.norm_stats_path: separate JSON     (15 km / 12 km caches preserved)
#   * diffusion.guidance_scale: 1.0           (was 2.0; 4B-5A finding)
#   * train.loss_weight: null                 (plumbing only in PR5B-1)
#
# Loaded via:
#   python -m experiments.run_stage4_train \
#       --profile pilot \
#       --config configs/diffusion_12km_zpin_weighted.yaml \
#       --output_suffix _zpin
#
# PR5B-1 does NOT launch any training. This config exists for the
# PR5B-2 dataset smoke and PR5B-3 pilot, both gated on user sign-off.

seed: 42

input:
  od_path: data/processed/od_evtol_12km.npy
  meta_path: data/processed/od_meta_12km.json

data:
  window: 1
  pad_multiple: 16

  # ---------------------------------------------------------------------
  # CHANGED vs configs/diffusion_12km.yaml: zero-pinned scheme. Zeros
  # are pinned to -1.0; nonzero counts are standardized with
  # nonzero-only mu_nz / sigma_nz. Restores the ~1.0-wide zero / nonzero
  # gap that the global_clip scheme collapsed to ~0.25 on the
  # 0.117%-sparse eVTOL tensor. See docs/decisions.md 2026-05-20
  # "Stage 4B-5A" entry.
  # ---------------------------------------------------------------------
  scheme: zero_pinned_nonzero

  # ---------------------------------------------------------------------
  # CHANGED vs configs/diffusion_12km.yaml: clip_val 100 -> 20. Under
  # nonzero-only stats (mu_nz ~ 0.7, sigma_nz ~ 0.13) clip_val=100 is
  # nowhere near the tail; clip_val=20 still admits counts up to a few
  # tens without saturation while keeping the normalised range usable
  # for the U-Net.
  # ---------------------------------------------------------------------
  clip_val: 20.0

  # ---------------------------------------------------------------------
  # CHANGED vs configs/diffusion_12km.yaml: separate JSON cache so the
  # 15 km baseline (od_norm_stats.json) and 12 km failed-dense-debug
  # baseline (od_norm_stats_12km.json) are never overwritten.
  # ---------------------------------------------------------------------
  norm_stats_path: data/processed/od_norm_stats_12km_zpin.json

  split:
    train_days: [0, 5]    # Mon..Fri  -> slots 0..239
    val_days:   [5, 6]    # Sat       -> slots 240..287
    test_days:  [6, 7]    # Sun       -> slots 288..335

model:
  base_channels: 16
  channel_mults: [1, 2, 4]
  num_res_blocks: 1
  time_emb_dim: 128
  cond_dropout_prob: 0.1

diffusion:
  num_train_timesteps: 1000
  beta_schedule: cosine
  num_inference_steps: 50
  # ---------------------------------------------------------------------
  # CHANGED vs configs/diffusion_12km.yaml: 2.0 -> 1.0. The Stage 4B-5A
  # posthoc sweep proved guidance_scale is a monotone over-density
  # amplifier; 1.0 (no CFG) sits at the no-amplification setting.
  # ---------------------------------------------------------------------
  guidance_scale: 1.0

train:
  batch_size: 1
  steps: 10
  lr: 2.0e-4
  weight_decay: 0.0
  grad_clip: 1.0
  ema_decay: 0.9999
  amp: true
  eval_every: 5
  ckpt_dir: results/stage4/smoke/ckpt
  # ---------------------------------------------------------------------
  # CHANGED vs PR5B-2 baseline: PR5B-3b enables the weighted ε-loss.
  # Formula (see ``src.models.diffusion.build_weight_map``):
  #
  #   w_raw = 1 + alpha * I(raw_count > 0) + beta * log1p(raw_count)
  #   w     = w_raw / w_raw.mean()                # normalize=='mean'
  #
  # alpha=2.0 / beta=0.5 is a *mild* setting -- on the 0.117 %-sparse
  # 12 km eVTOL tensor the per-cell weight ranges roughly
  # ``[1, 1 + 2 + 0.5 * log1p(count_tail)]`` ~ ``[1, 4-5]``, with the
  # raw-zero base 1.0 / mean ~ 1.003 ~= 1. This keeps loss magnitude
  # comparable to the unweighted F.mse_loss case (so val_loss_ema stays
  # interpretable) while raising the gradient signal on real nonzero
  # OD pairs. We deliberately do NOT start at alpha=5 / beta=1.0:
  # heavier weights risk pushing the model into a "hot spot" mode where
  # the few large-count cells dominate gradients and the zero region
  # gets under-fit -- the opposite of the PR5B-3 failure but equally
  # bad downstream.
  # ---------------------------------------------------------------------
  loss_weight:
    mode: nonzero_log1p
    alpha: 2.0
    beta: 0.5
    normalize: mean

sample:
  n_omega: 64
  od_samples_path: data/synthetic/od_samples.npy
  od_samples_agg_path: data/synthetic/od_samples_agg.npy

logging:
  backend: tb
  project: evtol-vertiport
